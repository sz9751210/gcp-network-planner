  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     - NODE_ENV=production
  #     - PORT=3001
  #     - DATABASE_URL=file:./dev.db
  #     - ENCRYPTION_KEY=936f2425316f73a12b9870492aef6733b9504147ef113a902065a59de4b0e946
  #     - CORS_ORIGINS=${FRONTEND_URL:-http://localhost:3000}
  #   volumes:
  #     - backend_data:/app/prisma
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s
  #   profiles:
  #     - node

  go-backend:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:/app/data/dev.db
      - ENCRYPTION_KEY=936f2425316f73a12b9870492aef6733b9504147ef113a902065a59de4b0e946
      - CORS_ORIGINS=${FRONTEND_URL:-http://localhost:3000}
      - GOOGLE_APPLICATION_CREDENTIALS=/home/appuser/.config/gcloud/application_default_credentials.json
    volumes:
      - go_backend_data:/app/data
      - ~/.config/gcloud:/home/appuser/.config/gcloud:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:80"
  #   environment:
  #     - VITE_API_URL=${API_URL:-http://backend:3001}
  #   depends_on:
  #     - backend
  #   restart: unless-stopped
  #   profiles:
  #     - node

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=${API_URL:-http://go-backend:3001}
    depends_on:
      - go-backend
    restart: unless-stopped

volumes:
  # backend_data:
  go_backend_data:
